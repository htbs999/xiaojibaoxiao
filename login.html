<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 微信群报销管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: #fff; border-radius: 16px; padding: 40px 32px;
            width: 90%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; font-size: 22px; color: #333; margin-bottom: 6px; }
        .sub { text-align: center; font-size: 13px; color: #999; margin-bottom: 28px; }
        input {
            width: 100%; padding: 14px 16px; font-size: 16px;
            border: 2px solid #e0e0e0; border-radius: 10px; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #667eea; }
        button {
            width: 100%; padding: 14px; margin-top: 16px; font-size: 16px; font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 10px; cursor: pointer;
        }
        button:active { opacity: 0.85; }
        .hint { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h1>群报销管理</h1>
    <p class="sub">输入你的名字开始使用</p>
    <input type="text" id="username" placeholder="如：张三" autocomplete="off" maxlength="20">
    <button onclick="doLogin()">登录 / 注册</button>
    <p class="hint">新用户自动注册，无需密码</p>
</div>

<script>
const inp = document.getElementById("username");
inp.focus();
inp.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

async function doLogin() {
    const name = inp.value.trim();
    if (!name) return inp.focus();
    try {
        const r = await fetch("/api/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            credentials: 'include',   // ← 关键：带上 cookie
            body: JSON.stringify({username: name})
        });
        if (r.ok) { window.location.replace("/") }
        else { const d = await r.json(); alert(d.error); }
    } catch (e) { alert("连接失败，请检查服务是否启动"); }
}
</script>
</body>
</html>
