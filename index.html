<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信群报销管理</title>
    <style>
        /* ====== 样式部分完全保留你原有的，此处省略以节省篇幅 ====== */
        /* 实际使用时请保留你原有的全部样式 */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6fa;color:#2c3e50;min-height:100vh}
        .app{padding:12px;max-width:1100px;margin:0 auto}
        /* …… 其余样式完全沿用你已有的，此处不重复粘贴，但最终文件应包含全部样式 */
    </style>
</head>
<body>
<div class="drop-overlay" id="dropOverlay"></div>
<div class="app">
    <!-- 顶部 -->
    <div class="topbar">
        <h1>微信群报销管理</h1>
        <div class="user-info">
            <span id="whoami"></span>
            <span class="badge" id="adminBadge" style="display:none">管理员</span>
            <button class="btn btn-outline btn-sm" onclick="showStats()">统计</button>
            <div class="dropdown" id="exportDropdown">
                <button class="btn btn-outline btn-sm" onclick="toggleExport()">导出 ▾</button>
                <div class="dropdown-menu" id="exportMenu">
                    <button onclick="doExport('excel')">导出 Excel</button>
                    <button onclick="previewExport('pdf')">导出 PDF</button>
                </div>
            </div>
            <button class="btn btn-green btn-sm" onclick="showQuickAdd()">＋录入</button>
            <button class="btn btn-gray btn-sm" onclick="logout()">退出</button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-row" id="statsCards"></div>

    <!-- 统计详情面板 -->
    <div class="stats-panel" id="statsPanel">
        <h3>数据统计 <button class="btn btn-sm btn-outline" style="float:right" onclick="hideStats()">收起</button></h3>
        <div class="stats-grid" id="statsDetail"></div>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <input type="text" id="searchQ" placeholder="搜索 报销人/备注/品类..." oninput="debounceSearch()">
        <input type="text" id="filterCategory" placeholder="品类筛选" list="catDatalist" oninput="debounceSearch()" autocomplete="off">
        <datalist id="catDatalist"></datalist>
        <select id="filterPerson" onchange="search()">
            <option value="">全部报销人</option>
        </select>
        <span class="sep">日期：</span>
        <input type="date" id="filterStart" onchange="search()" style="max-width:130px">
        <span class="sep">~</span>
        <input type="date" id="filterEnd" onchange="search()" style="max-width:130px">
        <button class="btn btn-outline btn-sm" onclick="clearFilters()">清除</button>
    </div>

    <!-- 表格 -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>日期</th><th>报销人</th><th>品类</th><th>金额</th><th>图片</th><th>用户</th><th>备注</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div class="pagination" id="pager"></div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>编辑报销记录</h2>
        <div class="row"><label>日期</label><input type="date" id="editDate"></div>
        <div class="row"><label>报销人</label><input type="text" id="editPerson"></div>
        <div class="row"><label>品类</label><input type="text" id="editCategory" list="catDatalist" autocomplete="off"></div>
        <div class="row"><label>金额</label><input type="number" step="0.01" id="editAmount"></div>
        <div class="row"><label>备注</label><input type="text" id="editRemark"></div>
        <div class="modal-actions">
            <button class="btn btn-gray btn-sm" onclick="closeModal()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<!-- 快捷录入弹窗 -->
<div class="modal-overlay" id="quickAddModal">
    <div class="modal" style="max-width:480px">
        <h2>快捷录入</h2>
        <div style="display:flex;gap:0;margin-bottom:10px;border-bottom:2px solid #eee">
            <button class="btn btn-outline btn-sm tab-btn active" data-tab="text" onclick="switchTab('text')" style="border-bottom:none;border-radius:6px 6px 0 0">文本解析</button>
            <button class="btn btn-outline btn-sm tab-btn" data-tab="ocr" onclick="switchTab('ocr')" style="border-bottom:none;border-radius:6px 6px 0 0">OCR识图</button>
        </div>
        <div id="tabText">
            <textarea id="parseInput" rows="5" placeholder="粘贴报账文本&#10;示例：张三6月1号请客吃饭花了128.5元&#10;      李四 2024-06-02 交通 35 打车费" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;resize:vertical;font-family:inherit"></textarea>
            <div id="parsePreview" style="margin-top:8px;font-size:12px;color:#555;max-height:120px;overflow-y:auto"></div>
            <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
                <button class="btn btn-outline btn-sm" onclick="parseAndPreview()">解析预览</button>
                <button class="btn btn-primary btn-sm" id="confirmParseBtn" disabled onclick="confirmParse()">确认录入</button>
            </div>
        </div>
        <div id="tabOcr" style="display:none">
            <input type="file" id="ocrFileInput" accept="image/*" style="margin-bottom:8px;font-size:13px" onchange="previewOcrImage()">
            <div id="ocrPreview" style="font-size:12px;color:#555;margin-bottom:8px"></div>
            <button class="btn btn-primary btn-sm" id="ocrSubmitBtn" onclick="submitOcr()">识别并录入</button>
            <div class="progress-wrap" id="ocrProgress">
                <div class="progress-bar"><div class="fill" id="ocrProgressFill"></div></div>
                <div class="progress-label" id="ocrProgressLabel"></div>
            </div>
            <div id="ocrResultPreview" style="display:none;margin-top:10px;border-top:1px solid #eee;padding-top:10px">
                <div class="row"><label>日期</label><input type="date" id="ocrDate"></div>
                <div class="row"><label>品类</label><input type="text" id="ocrCategory" list="catDatalist" autocomplete="off"></div>
                <div class="row"><label>金额</label><input type="number" step="0.01" id="ocrAmount"></div>
                <div class="row"><label>备注</label><input type="text" id="ocrRemark"></div>
                <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
                    <button class="btn btn-outline btn-sm" onclick="cancelOcrPreview()">取消</button>
                    <button class="btn btn-green btn-sm" id="ocrConfirmBtn" onclick="confirmOcr()">确认录入</button>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-gray btn-sm" onclick="closeQuickAdd()">关闭</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- 图片查看浮层 -->
<div class="modal-overlay" id="imageOverlay" onclick="closeImage()">
    <img id="imageViewer" src="" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);cursor:default" onclick="event.stopPropagation()">
</div>

<!-- PDF 导出预览弹窗 -->
<div class="modal-overlay" id="pdfPreviewModal">
    <div class="modal" style="max-width:440px">
        <h2>导出 PDF 预览</h2>
        <div id="pdfPreviewContent" style="font-size:13px;line-height:1.8;margin-bottom:14px"></div>
        <div class="modal-actions">
            <button class="btn btn-gray btn-sm" onclick="closePdfPreview()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="confirmPdfDownload()">下载 PDF</button>
        </div>
    </div>
</div>

<script>
// ====== 统一请求函数（自动携带 Token） ======
function apiFetch(url, options = {}) {
    const token = localStorage.getItem('token');
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers
    };
    if (token) {
        headers['Authorization'] = 'Bearer ' + token;
    }
    return fetch(url, { ...options, headers }).then(res => {
        if (res.status === 401) {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location = '/login';
            throw new Error('未登录');
        }
        return res;
    });
}

// ====== 状态变量 ======
let currentPage = 1;
let totalPages = 1;
let editingId = null;
let isAdmin = false;
let searchTimer = null;
const PER_PAGE = 20;

// ====== 初始化 ======
async function init() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location = '/login';
        return;
    }
    document.getElementById('whoami').textContent = localStorage.getItem('username') || '';
    await checkAdmin();
    await Promise.all([search(), loadStats(), loadFilterOptions()]);
}

function checkAdmin() {
    return apiFetch('/api/whoami').then(r=>r.json()).then(d=>{
        isAdmin = d.is_admin;
        if(isAdmin) document.getElementById('adminBadge').style.display='inline';
    }).catch(()=>{});
}

// ====== 搜索/分页 ======
async function search(page=1) {
    currentPage = page;
    const q = document.getElementById('searchQ').value.trim();
    const category = document.getElementById('filterCategory').value;
    const person = document.getElementById('filterPerson').value;
    const start = document.getElementById('filterStart').value;
    const end = document.getElementById('filterEnd').value;

    let url = `/api/expenses/search?page=${page}&per_page=${PER_PAGE}`;
    if(q) url += `&q=${encodeURIComponent(q)}`;
    if(category) url += `&category=${encodeURIComponent(category)}`;
    if(person) url += `&person=${encodeURIComponent(person)}`;
    if(start) url += `&start_date=${start}`;
    if(end) url += `&end_date=${end}`;

    try {
        const res = await apiFetch(url);
        const d = await res.json();
        totalPages = d.total_pages;
        renderTable(d.data);
        renderPager(d);
    } catch(e) { toast('加载失败'); }
}

function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if(!data.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state">暂无数据</td></tr>`;
        return;
    }
    tbody.innerHTML = data.map(r=>`
        <tr>
            <td>${r.date}</td>
            <td>${esc(r.person)}</td>
            <td>${esc(r.category)}</td>
            <td class="amount">¥${r.amount.toFixed(2)}</td>
            <td>${r.image_path ? `<a href="#" onclick="viewImage('${escAttr(r.image_path)}');return false" style="color:#3498DB;font-size:12px">查看</a>` : '<span style="color:#ccc">-</span>'}</td>
            <td>${esc(r.username||'')}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(r.remark||'')}</td>
            <td class="actions">
                <button class="btn btn-outline btn-sm" onclick="openEdit(${r.id},'${r.date}','${esc(r.person)}','${esc(r.category)}',${r.amount},'${esc(r.remark||'')}')">编辑</button>
                <button class="btn btn-danger btn-sm" onclick="del(${r.id})">删除</button>
            </td>
        </tr>
    `).join('');
}

function renderPager(d) {
    const pager = document.getElementById('pager');
    let html = `<span class="info">共 ${d.total} 条 / ¥${d.total_amount.toFixed(2)}</span>`;
    html += `<button ${currentPage<=1?'disabled':''} onclick="search(1)">«</button>`;
    html += `<button ${currentPage<=1?'disabled':''} onclick="search(${currentPage-1})">‹</button>`;

    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, currentPage + 2);
    for(let p=start; p<=end; p++) {
        html += `<button class="${p===currentPage?'active':''}" onclick="search(${p})">${p}</button>`;
    }

    html += `<button ${currentPage>=totalPages?'disabled':''} onclick="search(${currentPage+1})">›</button>`;
    html += `<button ${currentPage>=totalPages?'disabled':''} onclick="search(${totalPages})">»</button>`;
    pager.innerHTML = html;
}

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=>search(1), 300);
}
function clearFilters() {
    document.getElementById('searchQ').value = '';
    document.getElementById('filterCategory').value = '';
    document.getElementById('filterPerson').value = '';
    document.getElementById('filterStart').value = '';
    document.getElementById('filterEnd').value = '';
    search(1);
}

// ====== 统计 ======
async function loadStats() {
    try {
        const res = await apiFetch('/api/stats');
        const d = await res.json();
        document.getElementById('statsCards').innerHTML = `
            <div class="stat-card"><div class="num">${d.total_count}</div><div class="label">总条数</div></div>
            <div class="stat-card accent"><div class="num">¥${d.total_amount.toFixed(2)}</div><div class="label">总金额</div></div>
            <div class="stat-card"><div class="num">${d.by_person.length}</div><div class="label">报销人数</div></div>
            <div class="stat-card"><div class="num">${d.by_category.length}</div><div class="label">品类数</div></div>
        `;
        window._statsData = d;
    } catch(e) {}
}
function showStats() {
    const panel = document.getElementById('statsPanel');
    const d = window._statsData;
    if(!d) return;
    let html = `<div>
        <table class="stats-table"><thead><tr><th>品类</th><th>笔数</th><th>金额</th></tr></thead><tbody>
        ${d.by_category.map(c=>`<tr><td>${esc(c.category)}</td><td>${c.count}</td><td>¥${c.amount.toFixed(2)}</td></tr>`).join('')}
        </tbody></table></div>
        <div><table class="stats-table"><thead><tr><th>报销人</th><th>笔数</th><th>金额</th></tr></thead><tbody>
        ${d.by_person.map(p=>`<tr><td>${esc(p.person)}</td><td>${p.count}</td><td>¥${p.amount.toFixed(2)}</td></tr>`).join('')}
        </tbody></table></div>`;
    document.getElementById('statsDetail').innerHTML = html;
    panel.classList.add('show');
}
function hideStats() { document.getElementById('statsPanel').classList.remove('show'); }

// ====== 筛选选项 ======
async function loadFilterOptions() {
    try {
        const res = await apiFetch('/api/stats');
        const d = await res.json();
        const catDL = document.getElementById('catDatalist');
        catDL.innerHTML = d.by_category.map(c=>`<option value="${esc(c.category)}">`).join('');
        const personSel = document.getElementById('filterPerson');
        d.by_person.forEach(p=>{
            const opt = document.createElement('option');
            opt.value = p.person; opt.textContent = `${p.person} (${p.count})`;
            personSel.appendChild(opt);
        });
    } catch(e) {}
}

// ====== 编辑 ======
function openEdit(id, date, person, category, amount, remark) {
    editingId = id;
    document.getElementById('editDate').value = date;
    document.getElementById('editPerson').value = person;
    document.getElementById('editCategory').value = category;
    document.getElementById('editAmount').value = amount;
    document.getElementById('editRemark').value = remark;
    document.getElementById('editModal').classList.add('show');
}
function closeModal() { document.getElementById('editModal').classList.remove('show'); }
async function saveEdit() {
    const body = {
        date: document.getElementById('editDate').value,
        person: document.getElementById('editPerson').value,
        category: document.getElementById('editCategory').value,
        amount: parseFloat(document.getElementById('editAmount').value),
        remark: document.getElementById('editRemark').value
    };
    await apiFetch(`/api/expenses/${editingId}`,{method:'PUT', body:JSON.stringify(body)});
    closeModal();
    search(currentPage);
    loadStats();
    toast('已保存');
}
async function del(id) {
    if(!confirm('确定删除？')) return;
    await apiFetch(`/api/expenses/${id}`,{method:'DELETE'});
    search(currentPage);
    loadStats();
    toast('已删除');
}

// ====== 快捷录入 ======
let parsedRecords = [];
function showQuickAdd() { document.getElementById('quickAddModal').classList.add('show'); }
function closeQuickAdd() {
    document.getElementById('quickAddModal').classList.remove('show');
    parsedRecords = [];
    document.getElementById('parseInput').value = '';
    document.getElementById('parsePreview').innerHTML = '';
    document.getElementById('confirmParseBtn').disabled = true;
    document.getElementById('ocrFileInput').value = '';
    document.getElementById('ocrPreview').innerHTML = '';
    document.getElementById('ocrSubmitBtn').style.display = '';
    document.getElementById('ocrSubmitBtn').disabled = false;
    document.getElementById('ocrSubmitBtn').textContent = '识别并录入';
    document.getElementById('ocrResultPreview').style.display = 'none';
    document.getElementById('ocrProgress').classList.remove('show');
    if(ocrPollTimer) { clearInterval(ocrPollTimer); ocrPollTimer = null; }
}
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
    document.getElementById('tabText').style.display = tab==='text'?'block':'none';
    document.getElementById('tabOcr').style.display = tab==='ocr'?'block':'none';
}
async function parseAndPreview() {
    const text = document.getElementById('parseInput').value.trim();
    if(!text) { toast('请粘贴报账文本'); return; }
    const res = await apiFetch('/api/parse_text', {method:'POST', body:JSON.stringify({text})});
    const d = await res.json();
    if(d.error) { toast(d.error); return; }
    parsedRecords = d.records;
    document.getElementById('parsePreview').innerHTML = d.records.map((r,i)=>
        `<div>${i+1}. ${r.date} | ${r.person} | ${r.category} | ¥${r.amount.toFixed(2)} ${r.remark||''}</div>`
    ).join('');
    document.getElementById('confirmParseBtn').disabled = d.records.length===0;
    if(d.records.length) toast(`解析出 ${d.records.length} 条记录`);
}
async function confirmParse() {
    if(!parsedRecords.length) return;
    closeQuickAdd();
    search(currentPage);
    loadStats();
    toast(`已录入 ${parsedRecords.length} 条`);
}
function previewOcrImage() {
    const file = document.getElementById('ocrFileInput').files[0];
    document.getElementById('ocrPreview').innerHTML = file ? `已选择：${file.name}` : '';
}
let ocrImagePath = '';
let ocrPollTimer = null;
async function submitOcr(file) {
    if(!file) file = document.getElementById('ocrFileInput').files[0];
    if(!file) { toast('请选择图片'); return; }
    const btn = document.getElementById('ocrSubmitBtn');
    const progressWrap = document.getElementById('ocrProgress');
    const progressFill = document.getElementById('ocrProgressFill');
    const progressLabel = document.getElementById('ocrProgressLabel');

    btn.disabled = true; btn.textContent = '提交中...';
    const fd = new FormData(); fd.append('image', file);

    try {
        // 注意：FormData 不需要 Content-Type，apiFetch 会设置，但上传文件时不能设置 Content-Type
        // 这里我们手动构造 fetch，避免 apiFetch 自动添加的 JSON Content-Type
        const token = localStorage.getItem('token');
        const headers = {};
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const res = await fetch('/api/ocr', { method:'POST', body: fd, headers });
        const d = await res.json();
        if(d.error) { toast(d.error); btn.disabled = false; btn.textContent = '识别并录入'; return; }

        const taskId = d.task_id;
        btn.style.display = 'none';
        progressWrap.classList.add('show');
        progressFill.style.width = '0%';
        progressLabel.textContent = '准备中...';

        ocrPollTimer = setInterval(async () => {
            try {
                const pr = await apiFetch('/api/ocr/progress/' + taskId);
                const pd = await pr.json();
                progressFill.style.width = pd.progress + '%';
                progressLabel.textContent = pd.status;

                if(pd.done) {
                    clearInterval(ocrPollTimer);
                    ocrPollTimer = null;
                    progressWrap.classList.remove('show');

                    if(pd.ok) {
                        document.getElementById('ocrDate').value = new Date().toISOString().split('T')[0];
                        document.getElementById('ocrCategory').value = '其他';
                        if(pd.amount != null) {
                            document.getElementById('ocrAmount').value = pd.amount;
                        } else {
                            document.getElementById('ocrAmount').value = '';
                            document.getElementById('ocrAmount').placeholder = '手动输入金额';
                        }
                        let remark = '';
                        if(pd.raw_text) {
                            remark = 'OCR识别: ' + pd.raw_text;
                        } else {
                            remark = 'OCR识别（未提取到金额）';
                        }
                        document.getElementById('ocrRemark').value = remark;
                        ocrImagePath = pd.image_path || '';
                        document.getElementById('ocrResultPreview').style.display = 'block';

                        if(pd.amount != null) {
                            toast('识别成功：¥' + pd.amount.toFixed(2) + ' (' + (pd.engine||'') + ')');
                        } else {
                            toast('未识别到金额，请手动输入');
                        }
                    } else {
                        toast(pd.error || '识别失败');
                        btn.style.display = '';
                        btn.disabled = false;
                        btn.textContent = '识别并录入';
                    }
                }
            } catch(e) {
                clearInterval(ocrPollTimer);
                ocrPollTimer = null;
                progressWrap.classList.remove('show');
                toast('请求失败');
                btn.style.display = '';
                btn.disabled = false;
                btn.textContent = '识别并录入';
            }
        }, 500);
    } catch(e) {
        toast('网络错误');
        btn.disabled = false;
        btn.textContent = '识别并录入';
    }
}
function cancelOcrPreview() {
    document.getElementById('ocrResultPreview').style.display = 'none';
    const btn = document.getElementById('ocrSubmitBtn');
    btn.style.display = '';
    btn.disabled = false;
    btn.textContent = '识别并录入';
}
async function confirmOcr() {
    const amountStr = document.getElementById('ocrAmount').value.trim();
    const amount = parseFloat(amountStr);
    if (isNaN(amount) || amount <= 0) {
        toast('请输入有效的金额');
        return;
    }
    const body = {
        date: document.getElementById('ocrDate').value,
        person: document.getElementById('whoami').textContent,
        category: document.getElementById('ocrCategory').value || '其他',
        amount: amount,
        remark: document.getElementById('ocrRemark').value,
        image_path: ocrImagePath
    };
    const res = await apiFetch('/api/expenses', {method:'POST', body:JSON.stringify(body)});
    if(res.ok) {
        toast('已录入');
        closeQuickAdd(); search(); loadStats();
    } else {
        const d = await res.json();
        toast(d.error || '录入失败');
    }
}

// ====== 辅助 ======
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }
function viewImage(path) {
    // 通过 apiFetch 获取图片 blob，再用 object URL 展示
    const filename = path.split(/[/\\]/).pop();
    apiFetch('/api/image/' + encodeURIComponent(filename))
        .then(res => res.blob())
        .then(blob => {
            const url = URL.createObjectURL(blob);
            document.getElementById('imageViewer').src = url;
            document.getElementById('imageOverlay').classList.add('show');
        })
        .catch(() => toast('图片加载失败'));
}
function closeImage() {
    document.getElementById('imageOverlay').classList.remove('show');
    // 释放 object URL
    const img = document.getElementById('imageViewer');
    if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
}
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}
async function logout() {
    await apiFetch('/api/logout',{method:'POST'});
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    window.location='/login';
}

// ====== 导出（改用 apiFetch + blob 下载） ======
let _exportFilters = null;
function toggleExport() {
    document.getElementById('exportMenu').classList.toggle('show');
}
document.addEventListener('click', e => {
    if (!document.getElementById('exportDropdown').contains(e.target)) {
        document.getElementById('exportMenu').classList.remove('show');
    }
});
function _getFilters() {
    return {
        q: document.getElementById('searchQ').value.trim(),
        category: document.getElementById('filterCategory').value,
        person: document.getElementById('filterPerson').value,
        start: document.getElementById('filterStart').value,
        end: document.getElementById('filterEnd').value
    };
}
function _buildExportUrl(fmt) {
    const f = _getFilters();
    let url = `/api/export?format=${fmt}`;
    if (f.q) url += `&q=${encodeURIComponent(f.q)}`;
    if (f.category) url += `&category=${encodeURIComponent(f.category)}`;
    if (f.person) url += `&person=${encodeURIComponent(f.person)}`;
    if (f.start) url += `&start_date=${f.start}`;
    if (f.end) url += `&end_date=${f.end}`;
    return url;
}
async function doExport(fmt) {
    document.getElementById('exportMenu').classList.remove('show');
    const url = _buildExportUrl(fmt);
    try {
        const res = await apiFetch(url);
        if (!res.ok) { toast('导出失败'); return; }
        const blob = await res.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `报销明细_${fmt}.${fmt === 'excel' ? 'xlsx' : 'pdf'}`;
        link.click();
        URL.revokeObjectURL(link.href);
    } catch(e) { toast('下载出错'); }
}
async function previewExport(fmt) {
    document.getElementById('exportMenu').classList.remove('show');
    const f = _getFilters();
    let url = '/api/expenses/search?per_page=5';
    if (f.q) url += `&q=${encodeURIComponent(f.q)}`;
    if (f.category) url += `&category=${encodeURIComponent(f.category)}`;
    if (f.person) url += `&person=${encodeURIComponent(f.person)}`;
    if (f.start) url += `&start_date=${f.start}`;
    if (f.end) url += `&end_date=${f.end}`;
    try {
        const res = await apiFetch(url);
        const d = await res.json();
        if (d.total === 0) { toast('没有可导出的数据'); return; }
        _exportFilters = f;
        const lines = [];
        lines.push(`即将导出 <b>${d.total}</b> 条报销记录`);
        lines.push(`合计金额：<b style="color:#E74C3C">¥${d.total_amount.toLocaleString('zh-CN', {minimumFractionDigits:2})}</b>`);
        if (d.data.length > 0) {
            lines.push('<hr style="margin:8px 0;border-color:#eee">');
            lines.push('<table style="width:100%;font-size:12px;border-collapse:collapse">');
            lines.push('<tr style="color:#888"><td>日期</td><td>报销人</td><td>品类</td><td>金额</td></tr>');
            for (const r of d.data.slice(0, 5)) {
                lines.push(`<tr><td>${esc(r.date)}</td><td>${esc(r.person)}</td><td>${esc(r.category)}</td><td style="text-align:right">¥${r.amount.toLocaleString('zh-CN',{minimumFractionDigits:2})}</td></tr>`);
            }
            if (d.total > 5) lines.push(`<tr><td colspan="4" style="color:#999;text-align:center">... 共 ${d.total} 条</td></tr>`);
            lines.push('</table>');
        }
        document.getElementById('pdfPreviewContent').innerHTML = lines.join('');
        document.getElementById('pdfPreviewModal').classList.add('show');
    } catch(e) { toast('加载预览失败'); }
}
function closePdfPreview() {
    document.getElementById('pdfPreviewModal').classList.remove('show');
}
function confirmPdfDownload() {
    closePdfPreview();
    doExport('pdf');
}

// ====== 拖拽图片上传 ======
let dragCounter = 0;
const dropOverlay = document.getElementById('dropOverlay');
document.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    if (dragCounter === 1) dropOverlay.classList.add('show');
}, true);
document.addEventListener('dragleave', function(e) {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('show'); }
}, true);
document.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
}, true);
document.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dragCounter = 0;
    dropOverlay.classList.remove('show');
    const files = e.dataTransfer.files;
    if (!files.length) return;
    const file = files[0];
    if (!file.type.startsWith('image/')) return;

    const modal = document.getElementById('quickAddModal');
    if (!modal.classList.contains('show')) showQuickAdd();
    switchTab('ocr');
    document.getElementById('ocrPreview').innerHTML = '已拖入：' + file.name;
    submitOcr(file);
}, true);

init();
</script>
